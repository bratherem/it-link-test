services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: car_ads
      POSTGRES_USER: car_user
      POSTGRES_PASSWORD: car_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U car_user -d car_ads"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: car_ads
      DB_USER: car_user
      DB_PASSWORD: car_password
      YII_DEBUG: "1"
      YII_ENV: dev
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: sh -c "composer install --no-interaction && php yii migrate/up --interactive=0 && php yii serve 0.0.0.0 8080"

volumes:
  postgres_data:
